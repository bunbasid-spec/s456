name: Manual Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Surum Numarasi (Orn: v1.0.3)'
        required: true
        default: 'v1.0.3'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Otomatik Versiyon Guncelleme Adimi
      - name: Update Version in build.gradle.kts
        run: |
          RAW_VERSION="${{ github.event.inputs.version_name }}"
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/[vV]//g')
          sed -i "s/versionName = \".*\"/versionName = \"$CLEAN_VERSION\"/g" app/build.gradle.kts
          NEW_CODE=$(date +%s)
          sed -i "s/versionCode = .*/versionCode = $NEW_CODE/g" app/build.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version_name }}
          name: Release ${{ github.event.inputs.version_name }}
          body: "Otomatik derlenen yeni surum (${{ github.event.inputs.version_name }})."
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
